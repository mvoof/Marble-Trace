name: PR Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  check-changes:
    name: Check Changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'src/**'
              - 'src-tauri/**'
              - 'package.json'
              - 'package-lock.json'
            ci:
              - '.github/**'

  lint:
    name: Lint (JS)
    needs: check-changes
    runs-on: ubuntu-latest
    if: ${{ needs.check-changes.outputs.app == 'true' }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          node-version: '20'
          platform: ubuntu-latest
          cache-rust: 'false'

      - name: Run ESLint
        run: npm run lint

  rust-checks:
    name: Rust Quality Checks
    needs: check-changes
    runs-on: ubuntu-latest
    if: ${{ needs.check-changes.outputs.app == 'true' }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          node-version: '20'
          platform: ubuntu-latest
          cache-rust: 'true'

      - name: Cargo Check
        working-directory: src-tauri
        run: cargo check
        shell: bash

      - name: Cargo Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
        shell: bash

      - name: Cargo Fmt
        working-directory: src-tauri
        run: cargo fmt --check
        shell: bash

  build-app:
    name: Build App
    needs: [lint, rust-checks]
    if: |
      contains(github.event.pull_request.labels.*.name, 'run-build') ||
      github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          node-version: '20'
          platform: ${{ matrix.platform }}
          cache-rust: 'true'

      - name: Build Tauri App
        run: npm run tauri:build:dev

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-build
          path: src-tauri/target/release/bundle/
          compression-level: 6
          if-no-files-found: warn

  status-check:
    name: PR Status
    needs: [check-changes, lint, rust-checks, build-app]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Check Status
        run: |
          echo "App changes: ${{ needs.check-changes.outputs.app }}"
          echo "Lint result: ${{ needs.lint.result }}"
          echo "Rust checks result: ${{ needs.rust-checks.result }}"
          echo "Build result: ${{ needs.build-app.result }}"

          if [ "${{ needs.check-changes.outputs.app }}" != "true" ]; then
            echo "No code changes, passing"
            exit 0
          fi

          if [ "${{ needs.lint.result }}" != "success" ] && [ "${{ needs.lint.result }}" != "skipped" ]; then
            echo "Lint failed"
            exit 1
          fi

          if [ "${{ needs.rust-checks.result }}" != "success" ] && [ "${{ needs.rust-checks.result }}" != "skipped" ]; then
            echo "Rust checks failed"
            exit 1
          fi

          if [ "${{ needs.build-app.result }}" != "success" ] && [ "${{ needs.build-app.result }}" != "skipped" ]; then
            echo "Build failed"
            exit 1
          fi

          echo "All checks passed"

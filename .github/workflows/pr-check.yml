name: PR Check

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  check-changes:
    name: Check Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      app: ${{ steps.filter.outputs.app }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'src/**'
              - 'src-tauri/**'
              - 'package.json'
              - 'package-lock.json'
            ci:
              - '.github/**'

  lint:
    name: Lint
    needs: check-changes
    runs-on: ubuntu-latest
    if: ${{ needs.check-changes.outputs.app == 'true' }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          node-version: '20'
          platform: ubuntu-latest

      - name: Run ESLint
        run: npm run lint

  build-app:
    name: Build App
    needs: [check-changes, lint]
    if: ${{ needs.check-changes.outputs.app == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          node-version: '20'
          platform: ${{ matrix.platform }}

      - name: Build Tauri App
        run: npm run tauri:build:dev

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-build
          path: src-tauri/target/release/bundle/
          compression-level: 6
          if-no-files-found: warn

  status-check:
    name: PR Status
    needs: [check-changes, lint, build-app]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Check Status
        run: |
          echo "App changes: ${{ needs.check-changes.outputs.app }}"
          echo "Lint result: ${{ needs.lint.result }}"
          echo "Build result: ${{ needs.build-app.result }}"

          if [ "${{ needs.check-changes.outputs.app }}" != "true" ]; then
            echo "No code changes, passing"
            exit 0
          fi

          if [ "${{ needs.lint.result }}" != "success" ] && [ "${{ needs.lint.result }}" != "skipped" ]; then
            echo "Lint failed"
            exit 1
          fi

          if [ "${{ needs.build-app.result }}" != "success" ] && [ "${{ needs.build-app.result }}" != "skipped" ]; then
            echo "Build failed"
            exit 1
          fi

          echo "All checks passed"

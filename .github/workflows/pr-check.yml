name: PR Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

# Cancel in-progress runs when a new push is made to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  check-changes:
    name: Check Changes
    runs-on: ubuntu-latest
    outputs:
      js: ${{ steps.filter.outputs.js }}
      rust: ${{ steps.filter.outputs.rust }}
      ci: ${{ steps.filter.outputs.ci }}
      app: ${{ steps.filter.outputs.js == 'true' || steps.filter.outputs.rust == 'true' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            js:
              - 'src/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'eslint.config.js'
            rust:
              - 'src-tauri/**'
            ci:
              - '.github/**'

  frontend-checks:
    name: Frontend Quality Checks
    needs: check-changes
    runs-on: ubuntu-latest
    if: ${{ needs.check-changes.outputs.js == 'true' || needs.check-changes.outputs.ci == 'true' }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          node-version: '20'
          platform: ubuntu-latest
          cache-rust: 'false'
          install-rust: 'false'
          install-system-deps: 'false'

      - name: Run ESLint
        run: npm run lint

      - name: Check Formatting
        run: npm run format:check

      - name: Type Check
        run: npx tsc --noEmit

      - name: Run Tests
        run: npm run test

  rust-checks:
    name: Rust Quality Checks
    needs: check-changes
    runs-on: windows-latest
    if: ${{ needs.check-changes.outputs.rust == 'true' || needs.check-changes.outputs.ci == 'true' }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          node-version: '20'
          platform: windows-latest
          cache-rust: 'true'

      - name: Cargo Clippy
        working-directory: src-tauri
        run: cargo clippy --locked -- -D warnings
        shell: bash

      - name: Cargo Fmt
        working-directory: src-tauri
        run: cargo fmt --check
        shell: bash

      - name: Cargo Test
        working-directory: src-tauri
        run: cargo test --locked
        shell: bash

  build-app:
    name: Build App
    needs: [check-changes, frontend-checks, rust-checks]
    if: |
      always() &&
      (needs.check-changes.outputs.app == 'true' || needs.check-changes.outputs.ci == 'true') &&
      (needs.frontend-checks.result == 'success' || needs.frontend-checks.result == 'skipped') &&
      (needs.rust-checks.result == 'success' || needs.rust-checks.result == 'skipped')
    environment: pr-review
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          node-version: '20'
          platform: ${{ matrix.platform }}
          cache-rust: 'true'

      - name: Build Tauri App
        run: npm run tauri:build:dev

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-build
          path: src-tauri/target/release/bundle/
          compression-level: 6
          if-no-files-found: warn

  status-check:
    name: PR Status
    needs: [check-changes, frontend-checks, rust-checks, build-app]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Check Status
        run: |
          echo "App changes: ${{ needs.check-changes.outputs.app }}"
          echo "Frontend checks result: ${{ needs.frontend-checks.result }}"
          echo "Rust checks result: ${{ needs.rust-checks.result }}"
          echo "Build result: ${{ needs.build-app.result }}"

          if [ "${{ needs.check-changes.outputs.app }}" != "true" ] && [ "${{ needs.check-changes.outputs.ci }}" != "true" ]; then
            echo "No code changes, passing"
            exit 0
          fi

          if [ "${{ needs.frontend-checks.result }}" != "success" ] && [ "${{ needs.frontend-checks.result }}" != "skipped" ]; then
            echo "Frontend checks failed"
            exit 1
          fi

          if [ "${{ needs.rust-checks.result }}" != "success" ] && [ "${{ needs.rust-checks.result }}" != "skipped" ]; then
            echo "Rust checks failed"
            exit 1
          fi

          if [ "${{ needs.build-app.result }}" != "success" ] && [ "${{ needs.build-app.result }}" != "skipped" ]; then
            echo "Build failed"
            exit 1
          fi

          echo "All checks passed"

name: 'Generate Release Notes'
description: 'Extracts release notes for the current version from CHANGELOG.md'
outputs:
  release_body:
    description: "The generated release notes"
    value: ${{ steps.generate.outputs.body }}
runs:
  using: "composite"
  steps:
    - name: Generate Notes
      id: generate
      shell: bash
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.tag_name }}" ]; then
          CURRENT_TAG="${{ inputs.tag_name }}"
        else
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
        fi

        VERSION="${CURRENT_TAG#v}"
        echo "Extracting CHANGELOG.md section for version: $VERSION"

        # Extract the block between ## [VERSION] and the next ## [
        NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)

        if [ -z "$NOTES" ]; then
          echo "WARNING: No section found in CHANGELOG.md for version $VERSION"
          NOTES="_No changelog entry found for this version._"
        fi

        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "body<<$EOF" >> $GITHUB_OUTPUT
        echo "$NOTES" >> $GITHUB_OUTPUT
        echo "$EOF" >> $GITHUB_OUTPUT

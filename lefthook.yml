pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,mjs}"
      run: npx oxlint --type-aware {staged_files}
    format:
      glob: "*.{ts,tsx,js,mjs,json,scss,md}"
      run: npx oxfmt --write {staged_files}
    rust-fmt:
      glob: "*.rs"
      root: "src-tauri/"
      run: cargo fmt --check